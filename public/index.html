<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Q-Pay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
        }

        .option-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 2px solid transparent;
        }

        .option-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            border-color: #667eea;
        }

        .option-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .option-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .option-description {
            color: #666;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .welcome-header h1 {
                font-size: 2.5rem;
            }
            
            .welcome-header p {
                font-size: 1.1rem;
            }
            
            .options-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .option-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Q-Pay</h1>
        <p style="color: #666; font-size: 1.1em; margin-bottom: 40px;">
            Empowering donations through secure digital payments
        </p>
        
        <div class="options">
            <div class="option-card" onclick="window.location.href='/donate'">
                <div class="option-icon">🤝</div>
                <div class="option-title">Are you a donor?</div>
                <div class="option-description">
                    Make a donation to help someone in need
                </div>
            </div>
            
            <div class="option-card" onclick="window.location.href='/ngo-login'">
                <div class="option-icon">🏢</div>
                <div class="option-title">Are you an NGO?</div>
                <div class="option-description">
                    Manage clients and track donations
                </div>
            </div>
        </div>
    </div>
</body>
</html>
